    <style>
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 60px;
        }
        .info-card {
            background: var(--bg-light);
            padding: 40px;
            border-radius: 10px;
        }
        .info-item {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item i {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
        }
        .contact-form textarea {
            height: 150px;
        }
        #map {
            width: 100%;
            height: 400px;
            border-radius: 10px;
            margin-top: 60px;
            background: #eee;
        }
        @media (max-width: 992px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
